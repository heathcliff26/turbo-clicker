---
name: CI

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: ["main"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/*"
      - "ui/*"
      - "packages/*"
  pull_request:
    branches: ["main"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/*"
      - "ui/*"
      - "packages/*"
      - ".github/workflows/ci.yaml"
      - "README.md"
  merge_group:
    branches: ["main"]

jobs:
  extract-version:
    uses: heathcliff26/ci/.github/workflows/cargo-version.yaml@main
    permissions:
      contents: read

  doc:
    uses: heathcliff26/ci/.github/workflows/run-script.yaml@main
    permissions:
      contents: read
    with:
      cmd: "hack/containerized make doc"

  lint:
    uses: heathcliff26/ci/.github/workflows/run-script.yaml@main
    permissions:
      contents: read
    with:
      cmd: "hack/containerized make lint"

  test:
    uses: heathcliff26/ci/.github/workflows/run-script.yaml@main
    permissions:
      contents: read
    with:
      cmd: "xvfb-run -a make test"
      additional-packages: "xvfb xsel"

  validate:
    uses: heathcliff26/ci/.github/workflows/run-script.yaml@main
    permissions:
      contents: read
    with:
      cmd: "hack/containerized make validate"

  build-binary:
    uses: heathcliff26/ci/.github/workflows/run-script.yaml@main
    permissions:
      contents: read
    with:
      cmd: "make release"
      artifact: "dist/turbo-clicker_linux-*.tar.gz"
      artifact-name: "turbo-clicker"
