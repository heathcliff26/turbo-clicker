---
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: turbo-clicker

before:
  hooks:
    - cargo fetch --locked

builds:
  - builder: rust
    tool: cargo
    command: build
    flags:
      - --release
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
    env:
      - CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=/usr/bin/aarch64-linux-gnu-gcc
      - CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=/usr/bin/x86_64-linux-gnu-gcc
      - PKG_CONFIG_ALLOW_CROSS=true
      - >-
        {{- if eq .Target "aarch64-unknown-linux-gnu" }}
          PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig
        {{- else if eq .Target "x86_64-unknown-linux-gnu" }}
          PKG_CONFIG_LIBDIR=/usr/lib/x86_64-linux-gnu/pkgconfig
        {{- end }}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ tolower .Os }}-{{ .Arch }}"
    files:
      - strip_parent: true
        src: "packages/*"

changelog:
  disable: true
release:
  disable: true
